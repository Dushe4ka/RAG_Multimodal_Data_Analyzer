<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Чат с агентом</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 1rem; background: #1a1a2e; color: #eee; min-height: 100vh; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    .meta { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
    .meta label { display: flex; align-items: center; gap: 0.25rem; }
    .meta input { padding: 0.35rem 0.5rem; border-radius: 4px; border: 1px solid #444; background: #2a2a3e; color: #eee; width: 220px; }
    button { padding: 0.4rem 0.75rem; border-radius: 4px; border: 1px solid #555; background: #333; color: #eee; cursor: pointer; }
    button:hover { background: #444; }
    button.primary { background: #3a6ea5; border-color: #4a7eb5; }
    #chat { height: 360px; overflow-y: auto; border: 1px solid #333; border-radius: 6px; padding: 0.75rem; margin-bottom: 0.75rem; background: #0f0f1a; }
    .msg { margin-bottom: 0.5rem; padding: 0.5rem; border-radius: 6px; max-width: 90%; }
    .msg.user { background: #2a3a5a; margin-left: 0; margin-right: auto; }
    .msg.assistant { background: #2a4a3a; margin-left: auto; margin-right: 0; }
    .msg .role { font-size: 0.7rem; opacity: 0.8; margin-bottom: 0.2rem; }
    .input-row { display: flex; gap: 0.5rem; }
    #input { flex: 1; padding: 0.5rem; border-radius: 4px; border: 1px solid #444; background: #2a2a3e; color: #eee; }
    #send { min-width: 80px; }
    .panel { margin-top: 1.5rem; border: 1px solid #333; border-radius: 6px; padding: 0.75rem; background: #16162a; }
    .panel h2 { font-size: 0.95rem; margin: 0 0 0.5rem 0; }
    .panel pre { font-size: 0.8rem; overflow-x: auto; max-height: 200px; overflow-y: auto; }
    .panel input, .panel textarea { width: 100%; padding: 0.35rem; margin-bottom: 0.5rem; border-radius: 4px; border: 1px solid #444; background: #2a2a3e; color: #eee; }
    .error { color: #e88; }
    .muted { color: #888; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>Чат с агентом (память + MCP)</h1>
  <div class="meta">
    <label>Thread ID: <input type="text" id="threadId" placeholder="UUID диалога" /></label>
    <button type="button" id="newThread">Новый диалог</button>
    <label>User ID: <input type="text" id="userId" placeholder="логин или id пользователя" title="Долговременная память привязана к User ID" /></label>
  </div>
  <div id="chat"></div>
  <div class="input-row">
    <input type="text" id="input" placeholder="Сообщение..." />
    <button type="button" id="send" class="primary">Отправить</button>
  </div>

  <div class="panel">
    <h2>История чекпоинтов (для отката)</h2>
    <button type="button" id="loadHistory">Загрузить историю</button>
    <pre id="historyOut" class="muted">Нажмите «Загрузить историю» для текущего thread_id.</pre>
    <label>Checkpoint ID для отката: <input type="text" id="checkpointId" placeholder="вставьте checkpoint_id" /></label>
    <button type="button" id="setRollback">Использовать при следующем сообщении</button>
  </div>

  <div class="panel">
    <h2>Долговременная память (по User ID)</h2>
    <p class="muted">Один набор данных на пользователя. Укажите User ID выше — тот же, что и для чата.</p>
    <button type="button" id="memoryLs">Список файлов</button>
    <pre id="memoryLsOut" class="muted">Список файлов в /memories/ для текущего User ID</pre>
    <label>Путь: <input type="text" id="memoryPath" value="/memories/preferences.txt" /></label>
    <button type="button" id="memoryRead">Прочитать</button>
    <textarea id="memoryContent" rows="3" placeholder="Содержимое для записи"></textarea>
    <button type="button" id="memoryWrite">Записать</button>
    <pre id="memoryReadOut" class="muted"></pre>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
